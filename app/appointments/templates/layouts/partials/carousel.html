{% if images %}
<div id="imageCarousel" class="carousel slide" data-ride="carousel" data-hash="{{ hash_value }}">
    <div class="carousel-inner">
        {% for image in images %}
        <div class="carousel-item {% if loop.first %} active{% endif %}" data-duration="{{ image.duration }}">
            <img src="{{ url_for('appointments_blueprint.get_image', image_id=image.image.id) }}" class="d-block w-100" alt="Imagen">
        </div>
        {% endfor %}
    </div>
    <a class="carousel-control-prev" href="#imageCarousel" role="button" data-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    </a>
    <a class="carousel-control-next" href="#imageCarousel" role="button" data-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
    </a>
</div>
{% endif %}
