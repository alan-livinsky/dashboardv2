<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos - Tablero Aeropuerto</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0a;
            --panel: #111111;
            --border: #222222;
            --text: #f0f0f0;
            --muted: #666666;
            --calling: #ffcc00;
            --attending: #00e676;
            --idle: #333333;
            --calling-bg: #1a1500;
            --attending-bg: #001a0d;
        }

        body {
            font-family: 'Courier New', 'Roboto Mono', monospace;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text);
            display: flex;
            flex-direction: column;
        }

        /* ─── HEADER ─── */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 32px;
            background: #050505;
            border-bottom: 2px solid var(--border);
        }

        .top-bar__brand {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .top-bar__clock {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 4px;
            font-variant-numeric: tabular-nums;
            color: var(--calling);
        }

        .top-bar__date {
            font-size: 0.85rem;
            color: var(--muted);
            text-align: right;
            letter-spacing: 1px;
        }

        /* ─── CALLING BANNER — unmissable alert ─── */
        .calling-banner {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 32px;
            padding: 0 32px;
            background: var(--calling);
            color: #000;
            animation: banner-flash 0.8s step-end infinite;
            min-height: 140px;
        }

        .calling-banner.active { display: flex; }

        @keyframes banner-flash {
            0%, 49% { background: var(--calling); }
            50%, 100% { background: #e6b800; }
        }

        .calling-banner__label {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        .calling-banner__room {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 4px;
            line-height: 1;
        }

        .calling-banner__patient {
            font-size: 3rem;
            font-weight: 700;
            line-height: 1;
            max-width: 600px;
        }

        .calling-banner__divider {
            width: 4px;
            height: 80px;
            background: rgba(0,0,0,0.3);
            border-radius: 2px;
        }

        /* ─── BOARD TABLE ─── */
        .board {
            flex: 1;
            padding: 0;
        }

        .board-table {
            width: 100%;
            border-collapse: collapse;
        }

        .board-table thead th {
            padding: 10px 24px;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            text-align: left;
            border-bottom: 1px solid var(--border);
            background: #080808;
        }

        .board-table th:last-child,
        .board-table td:last-child { text-align: center; }

        .board-row {
            border-bottom: 1px solid var(--border);
            transition: background 0.3s;
        }

        .board-row--calling {
            background: var(--calling-bg);
            animation: row-pulse 1s ease-in-out infinite;
        }

        .board-row--attending {
            background: var(--attending-bg);
        }

        .board-row--idle {
            background: var(--panel);
            opacity: 0.5;
        }

        @keyframes row-pulse {
            0%, 100% { background: var(--calling-bg); }
            50% { background: #241e00; }
        }

        .board-row td {
            padding: 18px 24px;
            vertical-align: middle;
        }

        .cell-room {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--text);
            white-space: nowrap;
        }

        .cell-room--calling { color: var(--calling); }
        .cell-room--attending { color: var(--attending); }

        .cell-patient {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .cell-patient--calling {
            color: var(--calling);
        }

        .cell-patient--idle {
            color: var(--muted);
            font-style: italic;
            font-size: 1rem;
            font-weight: 400;
        }

        .cell-doctor {
            font-size: 0.9rem;
            color: var(--muted);
            letter-spacing: 0.5px;
        }

        .cell-time {
            font-size: 1rem;
            color: var(--muted);
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums;
        }

        .cell-status {
            white-space: nowrap;
        }

        .status-pill {
            display: inline-block;
            padding: 6px 16px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .status-pill--calling {
            background: var(--calling);
            color: #000;
            animation: pill-blink 0.8s step-end infinite;
        }

        @keyframes pill-blink {
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.3; }
        }

        .status-pill--attending {
            background: transparent;
            color: var(--attending);
            border: 1px solid var(--attending);
        }

        .status-pill--idle {
            background: transparent;
            color: var(--muted);
            border: 1px solid var(--border);
        }

        /* ─── FOOTER STATS ─── */
        .footer {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 32px;
            padding: 12px 32px;
            background: #050505;
            border-top: 1px solid var(--border);
        }

        .footer-stat {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-stat__dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .footer-stat__dot--calling { background: var(--calling); }
        .footer-stat__dot--attending { background: var(--attending); }
        .footer-stat__dot--idle { background: var(--muted); }

        .footer-stat__text {
            font-size: 0.8rem;
            color: var(--muted);
            letter-spacing: 1px;
        }

        .footer-stat__count {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text);
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="top-bar__brand">Centro de Salud &mdash; Sala de Espera</div>
        <div class="top-bar__clock" id="clock">00:00:00</div>
        <div class="top-bar__date" id="date"></div>
    </div>

    <!-- Full-width unmissable calling alert -->
    <div class="calling-banner" id="callingBanner">
        <div>
            <div class="calling-banner__label">&#9654; Llamando</div>
        </div>
        <div class="calling-banner__room" id="bannerRoom">CONS. 1</div>
        <div class="calling-banner__divider"></div>
        <div class="calling-banner__patient" id="bannerPatient">María López</div>
    </div>

    <div class="board">
        <table class="board-table">
            <thead>
                <tr>
                    <th>Consultorio</th>
                    <th>Paciente</th>
                    <th>Médico</th>
                    <th>Hora llamado</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="boardBody"></tbody>
        </table>
    </div>

    <div class="footer">
        <div class="footer-stat">
            <div class="footer-stat__dot footer-stat__dot--calling"></div>
            <span class="footer-stat__text">Llamando:</span>
            <span class="footer-stat__count" id="countCalling">0</span>
        </div>
        <div class="footer-stat">
            <div class="footer-stat__dot footer-stat__dot--attending"></div>
            <span class="footer-stat__text">En atención:</span>
            <span class="footer-stat__count" id="countAttending">0</span>
        </div>
        <div class="footer-stat">
            <div class="footer-stat__dot footer-stat__dot--idle"></div>
            <span class="footer-stat__text">En espera:</span>
            <span class="footer-stat__count" id="countWaiting">8</span>
        </div>
    </div>

    <script>
        const ROOMS = [
            { id: 1, name: 'Consultorio 1', doctor: 'Dr. García',     status: 'calling',   patient: 'María López',       calledAt: '10:25' },
            { id: 2, name: 'Consultorio 2', doctor: 'Dra. Martínez',  status: 'attending', patient: 'Carlos Rodríguez',  calledAt: '10:15' },
            { id: 3, name: 'Consultorio 3', doctor: 'Dr. Pérez',      status: 'idle',      patient: null,                calledAt: null    },
            { id: 4, name: 'Consultorio 4', doctor: 'Dra. Sánchez',   status: 'attending', patient: 'Ana Martínez',      calledAt: '10:10' },
            { id: 5, name: 'Consultorio 5', doctor: 'Dr. López',      status: 'idle',      patient: null,                calledAt: null    },
            { id: 6, name: 'Consultorio 6', doctor: 'Dra. Fernández', status: 'calling',   patient: 'Roberto Jiménez',   calledAt: '10:28' },
        ];

        // Sort: calling first, then attending, then idle
        const sorted = () => [...ROOMS].sort((a, b) => {
            const order = { calling: 0, attending: 1, idle: 2 };
            return order[a.status] - order[b.status];
        });

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent =
                now.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            document.getElementById('date').textContent =
                now.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        function renderBoard() {
            const tbody = document.getElementById('boardBody');
            tbody.innerHTML = sorted().map(r => `
                <tr class="board-row board-row--${r.status}">
                    <td class="cell-room cell-room--${r.status}">${r.name.replace('Consultorio ', 'C')}</td>
                    <td class="cell-patient cell-patient--${r.status === 'idle' ? 'idle' : r.status}">
                        ${r.patient || '— Libre —'}
                    </td>
                    <td class="cell-doctor">${r.doctor}</td>
                    <td class="cell-time">${r.calledAt || '—'}</td>
                    <td class="cell-status">
                        <span class="status-pill status-pill--${r.status}">
                            ${r.status === 'calling' ? '▶ Llamando' : r.status === 'attending' ? 'En atención' : 'Libre'}
                        </span>
                    </td>
                </tr>
            `).join('');
        }

        function updateBanner() {
            const calling = ROOMS.filter(r => r.status === 'calling');
            const banner = document.getElementById('callingBanner');
            if (calling.length === 0) {
                banner.classList.remove('active');
                return;
            }
            // Show the most recently called
            const r = calling[calling.length - 1];
            banner.classList.add('active');
            document.getElementById('bannerRoom').textContent = r.name.toUpperCase();
            document.getElementById('bannerPatient').textContent = r.patient;
        }

        function updateStats() {
            document.getElementById('countCalling').textContent  = ROOMS.filter(r => r.status === 'calling').length;
            document.getElementById('countAttending').textContent = ROOMS.filter(r => r.status === 'attending').length;
        }

        function init() {
            updateClock();
            renderBoard();
            updateBanner();
            updateStats();
            setInterval(updateClock, 1000);
        }

        init();
    </script>
</body>
</html>
