<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turnos - Panel de Llamado</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #2563eb;
            --success: #16a34a;
            --warning: #ea580c;
            --danger: #dc2626;
            --dark: #0f172a;
            --gray: #64748b;
            --light: #f1f5f9;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--dark);
            min-height: 100vh;
            color: var(--white);
        }

        .top-bar {
            background: linear-gradient(90deg, var(--primary) 0%, #1d4ed8 100%);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
        }

        .top-bar__title {
            font-size: 1.5rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .top-bar__clock {
            font-size: 1.8rem;
            font-weight: 300;
            font-variant-numeric: tabular-nums;
        }

        .now-serving {
            padding: 32px;
            text-align: center;
            background: radial-gradient(ellipse at center, rgba(234, 88, 12, 0.2) 0%, transparent 70%);
        }

        .now-serving__label {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.6;
            margin-bottom: 16px;
            color: var(--warning);
        }

        .now-serving__name {
            font-size: 4rem;
            font-weight: 800;
            color: var(--warning);
            text-shadow: 0 0 60px rgba(234, 88, 12, 0.6);
            line-height: 1;
            margin-bottom: 16px;
            animation: text-glow 2s ease-in-out infinite;
        }

        @keyframes text-glow {
            0%, 100% { text-shadow: 0 0 40px rgba(234, 88, 12, 0.4); }
            50% { text-shadow: 0 0 80px rgba(234, 88, 12, 0.8), 0 0 120px rgba(234, 88, 12, 0.3); }
        }

        .now-serving__room {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--warning);
            color: var(--dark);
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .now-serving__doctor {
            margin-top: 12px;
            font-size: 1rem;
            opacity: 0.6;
        }

        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            margin: 0 32px;
        }

        .queue-section {
            padding: 24px 32px;
        }

        .queue-section__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .queue-section__title {
            font-size: 1.1rem;
            font-weight: 600;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .queue-section__count {
            background: rgba(255,255,255,0.1);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .queue-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .queue-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s;
        }

        .queue-card:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(4px);
        }

        .queue-card__position {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .queue-card__info {
            flex: 1;
        }

        .queue-card__name {
            font-weight: 600;
            font-size: 1.05rem;
            margin-bottom: 4px;
        }

        .queue-card__meta {
            font-size: 0.85rem;
            opacity: 0.5;
        }

        .queue-card__room {
            background: var(--primary);
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .attending-section {
            padding: 24px 32px;
            background: rgba(22, 163, 74, 0.1);
            border-top: 1px solid rgba(22, 163, 74, 0.2);
        }

        .attending-section__header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .attending-section__title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--success);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .attending-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .attending-card {
            background: rgba(22, 163, 74, 0.15);
            border: 1px solid rgba(22, 163, 74, 0.3);
            border-radius: 8px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .attending-card__name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .attending-card__room {
            background: var(--success);
            color: var(--dark);
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.8rem;
        }

        .alert-banner {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--warning);
            color: var(--dark);
            padding: 16px 40px;
            border-radius: 8px;
            font-size: 1.3rem;
            font-weight: 700;
            display: none;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(234, 88, 12, 0.5);
            animation: bounce 0.5s ease-in-out infinite;
        }

        .alert-banner.active {
            display: block;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-5px); }
        }

        .footer-stats {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            gap: 48px;
            padding: 12px 32px;
        }

        .footer-stat {
            text-align: center;
        }

        .footer-stat__value {
            font-size: 1.4rem;
            font-weight: 700;
        }

        .footer-stat__value--warning { color: var(--warning); }
        .footer-stat__value--success { color: var(--success); }

        .footer-stat__label {
            font-size: 0.7rem;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            .top-bar { padding: 12px 16px; flex-direction: column; gap: 8px; }
            .now-serving { padding: 24px 16px; }
            .now-serving__name { font-size: 2.5rem; }
            .now-serving__room { font-size: 1.1rem; padding: 10px 24px; }
            .queue-section, .attending-section { padding: 16px; }
            .footer-stats { gap: 24px; padding: 10px 16px; }
        }
    </style>
</head>
<body>
    <div class="alert-banner" id="alertBanner">¡PACIENTE LLAMADO!</div>

    <header class="top-bar">
        <div class="top-bar__title">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
            Panel de Llamado
        </div>
        <div class="top-bar__clock" id="clock">00:00:00</div>
    </header>

    <section class="now-serving" id="nowServing">
        <div class="now-serving__label">Ahora siendo atendido</div>
        <div class="now-serving__name" id="currentName">Esperando...</div>
        <div class="now-serving__room" id="currentRoom">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            <span id="currentRoomText">---</span>
        </div>
        <div class="now-serving__doctor" id="currentDoctor">Sin médico asignado</div>
    </section>

    <div class="divider"></div>

    <section class="queue-section">
        <div class="queue-section__header">
            <div class="queue-section__title">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                En espera de ser llamados
            </div>
            <span class="queue-section__count" id="queueCount">0 pacientes</span>
        </div>
        <div class="queue-grid" id="queueGrid">
            <!-- Queue cards will be dynamically populated -->
        </div>
    </section>

    <section class="attending-section">
        <div class="attending-section__header">
            <div class="attending-section__title">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                Actualmente en atención
            </div>
        </div>
        <div class="attending-grid" id="attendingGrid">
            <!-- Attending cards will be dynamically populated -->
        </div>
    </section>

    <footer class="footer-stats">
        <div class="footer-stat">
            <div class="footer-stat__value footer-stat__value--warning" id="statWaiting">0</div>
            <div class="footer-stat__label">En Espera</div>
        </div>
        <div class="footer-stat">
            <div class="footer-stat__value footer-stat__value--success" id="statAttending">0</div>
            <div class="footer-stat__label">En Atención</div>
        </div>
    </footer>

    <script>
        const SAMPLE_DATA = {
            now: { name: 'María Elena López', room: 'Consultorio 3', doctor: 'Dr. Roberto García' },
            queue: [
                { name: 'Carlos Mendoza', room: 'Consultorio 1' },
                { name: 'Ana Beatriz Torres', room: 'Consultorio 2' },
                { name: 'Pedro Jiménez', room: 'Consultorio 4' },
                { name: 'Lucía Fernández', room: 'Consultorio 1' },
                { name: 'Miguel Ángel Díaz', room: 'Consultorio 3' },
                { name: 'Rosa María Morales', room: 'Consultorio 2' }
            ],
            attending: [
                { name: 'Juan Carlos Reyes', room: 'Consultorio 5' },
                { name: 'Elena Vázquez', room: 'Consultorio 6' }
            ]
        };

        let previousNow = null;

        function updateClock() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        }

        function checkNewCall() {
            if (previousNow !== SAMPLE_DATA.now.name) {
                previousNow = SAMPLE_DATA.now.name;
                const banner = document.getElementById('alertBanner');
                banner.classList.add('active');
                setTimeout(() => banner.classList.remove('active'), 5000);
            }
        }

        function renderNow() {
            document.getElementById('currentName').textContent = SAMPLE_DATA.now.name;
            document.getElementById('currentRoomText').textContent = SAMPLE_DATA.now.room;
            document.getElementById('currentDoctor').textContent = SAMPLE_DATA.now.doctor;
            checkNewCall();
        }

        function renderQueue() {
            const grid = document.getElementById('queueGrid');
            grid.innerHTML = SAMPLE_DATA.queue.map((p, i) => `
                <div class="queue-card">
                    <div class="queue-card__position">${i + 1}</div>
                    <div class="queue-card__info">
                        <div class="queue-card__name">${p.name}</div>
                        <div class="queue-card__meta">${SAMPLE_DATA.now.doctor}</div>
                    </div>
                    <div class="queue-card__room">${p.room}</div>
                </div>
            `).join('');
            document.getElementById('queueCount').textContent = `${SAMPLE_DATA.queue.length} pacientes`;
        }

        function renderAttending() {
            const grid = document.getElementById('attendingGrid');
            grid.innerHTML = SAMPLE_DATA.attending.map(p => `
                <div class="attending-card">
                    <span class="attending-card__name">${p.name}</span>
                    <span class="attending-card__room">${p.room}</span>
                </div>
            `).join('');
        }

        function updateStats() {
            document.getElementById('statWaiting').textContent = SAMPLE_DATA.queue.length;
            document.getElementById('statAttending').textContent = SAMPLE_DATA.attending.length;
        }

        function init() {
            updateClock();
            renderNow();
            renderQueue();
            renderAttending();
            updateStats();
            setInterval(updateClock, 1000);
            setInterval(renderNow, 5000);
            setInterval(renderQueue, 5000);
            setInterval(renderAttending, 5000);
        }

        init();
    </script>
</body>
</html>
